name: docs-site

# Builds the MkDocs user guide (mkdocs.yml + userdocs/) into a static nginx
# container image and publishes it to GHCR. The in-cluster Deployment (Helm
# `docsSite.enabled`, mutable :latest tag + Always pull) picks it up on its next
# pod restart / roll. No secrets touch the build: the guide is rendered from
# checked-in Markdown only. Mirrors the public-site workflow's shape.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mkdocs.yml'
      - 'userdocs/**'
      - '.github/workflows/docs-site.yml'

# Push the image to GHCR; contents:read for checkout.
permissions:
  contents: read
  packages: write

# One publish at a time; don't cancel an in-flight build.
concurrency:
  group: docs-site
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kazper-docs

jobs:
  build-publish:
    name: Build image + publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `mkdocs build --strict` runs inside the image build — broken nav or links
      # fail here and nothing is pushed; the previously-published image keeps
      # serving.
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: userdocs/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
