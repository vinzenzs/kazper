name: public-site

# Builds the static "road to race" page (apps/public) into a container image and
# publishes it to GHCR, then rolls the in-cluster Deployment onto the new image.
# The feed is read ONCE, at image-build time, with the X-Feed-Key from the Actions
# secret store passed as a BuildKit secret — it never enters an image layer, and
# the shipped image is nginx serving static files with no path to Kazper. A failed
# build never pushes or rolls: the previously-deployed image keeps serving (the
# page recomputes its countdown client-side, so it degrades to stale, never
# broken). Supersedes the earlier GitHub Pages deploy (host-public-site-in-cluster).

on:
  # Nightly, shortly after midnight in the athlete's timezone (Europe/Berlin) so
  # the prerendered fallback and the OG card roll over daily. 23:15 UTC is
  # 00:15 CET (winter) / 01:15 CEST (summer) — after local midnight year-round.
  schedule:
    - cron: '15 23 * * *'
  # Rebuild on demand — e.g. after re-anchoring the season's macrocycle/race.
  workflow_dispatch:
  # Rebuild when the site or this workflow changes.
  push:
    branches: [main]
    paths:
      - 'apps/public/**'
      - '.github/workflows/public-site.yml'

# Push the image to GHCR; contents:read for checkout.
permissions:
  contents: read
  packages: write

# One publish at a time; don't cancel an in-flight build/roll.
concurrency:
  group: public-site
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kazper-public-site

jobs:
  build-publish:
    name: Build image + publish + roll
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the site into the image and push. FEED_SECRET is a BuildKit secret
      # (never a layer); FEED_URL / SITE_URL are build args. A non-200 feed fails
      # the build here, so nothing is pushed and the roll below is skipped.
      - name: Build + push image
        uses: docker/build-push-action@v6
        with:
          context: apps/public
          file: apps/public/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          secrets: |
            feed_secret=${{ secrets.FEED_SECRET }}
          build-args: |
            FEED_URL=${{ vars.FEED_URL }}
            SITE_URL=${{ vars.PUBLIC_SITE_URL }}
            BASE_PATH=/

      # Roll the in-cluster Deployment onto the freshly-pushed image. Mechanism is
      # operator-choice (D3): this default does a `rollout restart` (works with a
      # mutable :latest tag + imagePullPolicy Always), gated on a kubeconfig
      # secret so the workflow stays valid without cluster creds — when absent,
      # the image is published and a GitOps tool / the next `helm upgrade` picks
      # it up. Only runs after a successful build+push.
      - name: Roll Deployment
        if: ${{ secrets.KUBECONFIG_B64 != '' }}
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
          NAMESPACE: ${{ vars.PUBLIC_SITE_NAMESPACE || 'default' }}
          DEPLOYMENT: ${{ vars.PUBLIC_SITE_DEPLOYMENT || 'kazper-public-site' }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl -n "$NAMESPACE" rollout restart "deployment/$DEPLOYMENT"
          kubectl -n "$NAMESPACE" rollout status "deployment/$DEPLOYMENT" --timeout=120s
