        type: string
      intensity_factor:
        type: number
      kcal_burned:
        type: number
      max_hr:
        type: integer
      multisport_template_id:
        description: |-
          MultisportTemplateID (per multisport-phase-2) is the multisport template a
          planned multisport workout (`sport='multisport'`) was materialized from —
          set instead of TemplateID for a brick/triathlon row. Nullable; single-sport
          and imported activities carry it as nil.
        type: string
      name:
        type: string
      needs_link:
        description: |-
          NeedsLink (per add-workout-reconciliation) marks a completed import that
          matched more than one open planned workout, so it was inserted standalone
          rather than auto-merged — the app/agent should offer to link it. Cleared
          on fulfill.
        type: boolean
      normalized_power_w:
        type: integer
      notes:
        type: string
      plan_slot_id:
        type: string
      rpe:
        description: |-
          Per-session rehearsal-outcome signals — both nullable, set by the user
          after a fueling-rehearsal workout. Validated 1..10 (Borg CR-10) and 1..5
          (1=no GI distress, 5=severe) at handler + DB CHECK layers.
        type: integer
      secs_in_zone_1:
        description: |-
          HR-zone time, seconds in each of the fixed five Garmin zones. Fixed
          cardinality → columns (not a child table), so the most-queried fueling
          signal needs no join and rides along on list responses.
        type: integer
      secs_in_zone_2:
        type: integer
      secs_in_zone_3:
        type: integer
      secs_in_zone_4:
        type: integer
      secs_in_zone_5:
        type: integer
      session_group:
        type: string
      sets:
        items:
          $ref: '#/definitions/workouts.Set'
        type: array
      source:
        $ref: '#/definitions/workouts.Source'
      splits:
        description: |-
          Nested detail — populated on single-get only (the list query omits them to
          keep payloads bounded). Empty slices serialize as absent via omitempty.
        items:
          $ref: '#/definitions/workouts.Split'
        type: array
      sport:
        $ref: '#/definitions/workouts.Sport'
      started_at:
        type: string
      status:
        $ref: '#/definitions/workouts.Status'
      sweat_loss_ml:
        type: number
      temperature_c:
        type: number
      template_id:
        description: |-
          Plan links (per add-training-plan), both nullable. TemplateID is the
          workout-template a planned workout was compiled from; PlanSlotID is the
          training-plan slot it materializes (the materialize upsert key). Imported
          activities carry neither.
        type: string
      training_focus:
        allOf:
        - $ref: '#/definitions/workouts.TrainingFocus'
        description: |-
          TrainingFocus classifies the session's intensity band (7-zone German
          Trainingsbereiche). Nullable — NULL/absent means "unclassified". Declared
          intent, set by the user/coach; never derived from the secs_in_zone_* actuals.
      tss:
        type: number
      tss_source:
        description: |-
          TSSSource records how TSS was obtained: garmin|manual (caller-supplied) or
          power|pace|hr (server-derived). Server-managed, response-only (never bound
          from a request), and paired with TSS by a DB CHECK. Per add-per-sport-tss.
        type: string
      updated_at:
        type: string
      variability_index:
        description: |-
          Stream-derived execution-quality metrics (persist-activity-streams), all
          nullable. Written ONLY by the activity-streams ingest/recompute path — never
          accepted on POST/bulk/PATCH. VI = NP/mean power, EF = NP or speed per HR,
          decoupling_pct = aerobic HR-drift over the activity halves.
        type: number
      wind_speed_mps:
        type: number
    type: object
  workouts.bulkCreateRequest:
    type: object
  workouts.createRequest:
    type: object
  workouts.fulfillRequest:
    properties:
      completed_id:
        type: string
    type: object
  workoutstats.Bands:
