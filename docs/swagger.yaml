  /nutrition/expenditure:
    get:
      description: 'Estimates average daily expenditure over the window from the two
        series already logged: `mean(intake over logged days) − Δ trend-weight × 7700
        kcal/kg ÷ window_days`. The mass signal is the body-weight capability''s own
        smoothed trend (7-day trailing) evaluated at the window ends; the values and
        the dates they were taken at are echoed. A day counts as logged only when
        it holds at least one meal — an unlogged day is excluded from the mean and
        counted in `days_unlogged`, never read as zero intake. Honesty gates degrade
        to `200` with a null estimate: fewer than 14 logged days → `insufficient_logged_days`;
        fewer than 5 weigh-ins in the window → `insufficient_weigh_ins`. 21–28 day
        windows read most honestly; a window spanning deliberate glycogen manipulation
        (carb-load, race taper) moves water mass, not tissue, and distorts the estimate.
        Under-logged snacks bias the number down. Compute-on-read: persists nothing,
        reads no goals — comparing against a target and applying a change stay with
        the caller and the goals endpoints.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD; max 92-day span
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/expenditure.Expenditure'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Adaptive energy expenditure (TDEE) from energy balance
      tags:
      - nutrition
  /nutrition/fuel-plan:
    get:
      description: 'Classifies each day in the window by its PLANNED load and suggests
        a matching carbohydrate target — "fuel for the work required". Tier from total
        planned TSS: `rest` (no planned session) / `easy` (< 60) / `moderate` (60–150)
        / `heavy` (> 150, or any single planned session of 150 min or more — a long
        endurance day is glycogen-expensive at any intensity). Tiers map to a fixed
        3 / 5 / 7 / 9 g/kg ladder, multiplied by the latest smoothed body-weight trend
        (echoed with its date) to give `suggested_carbs_g`, reported beside that date''s
        currently-effective goal carbs (override > phase template > default) and the
        `delta_g` between them. Days past the last materialized plan day carry `plan_missing:
        true` — a rest suggestion and a no-plan-data suggestion must not look alike.
        No weight data degrades to tiers and g/kg without gram targets (`reason: "weight_missing"`).
        Window defaults to today plus six days, capped at 14. SUGGESTIONS ONLY: compute-on-read,
        persists nothing, and never writes a goal or override — applying a day''s
        number is the existing per-date goal-override PUT.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD (defaults to today)
        in: query
        name: from
        type: string
      - description: Inclusive end date YYYY-MM-DD (defaults to from + 6 days); max
          14-day span
        in: query
        name: to
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/fuelplan.Plan'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Periodized carb targets from planned training load
      tags:
      - nutrition
  /performance/pmc:
    get:
      description: 'Compute-on-read Coggan PMC over stored completed-workout TSS:
        one entry per calendar day in [from, to] with `tss_total`, `ctl` (42-day EWMA
        fitness), `atl` (7-day EWMA fatigue), `tsb` (yesterday''s ctl−atl form), and
        `ramp_rate` (ctl change over 7 days). The EWMA warms up from the earliest
        completed workout so values are window-independent (`seed_date` reports the
        warm-up start). `ramp_alerts` flags Monday-start weeks whose CTL rose more
        than 8/week. Only completed workouts contribute; a completed workout with
        NULL tss counts 0 but is surfaced via per-day `missing_tss_count` + window
        `missing_tss_workouts`. Distinct from Garmin''s stored acute/chronic load.
        Range capped at 400 days; read-only.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      - description: Filter to one sport (bike|run|swim|strength|multisport|…); omitted
          = combined. Multisport workouts count under 'multisport' (no per-segment
          TSS split).
        in: query
        name: sport
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pmc.Series'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid | sport_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Performance Management Chart (CTL/ATL/TSB) daily series
      tags:
      - performance
  /performance/pmc/target-trajectory:
    get:
      description: 'Simulates the target CTL curve implied by the macrocycle''s declared
        phase `target_weekly_tss` (daily = weekly/7 through the same 42-day EWMA as
        the measured PMC, seeded from the actual CTL on the macrocycle start date)
        beside the measured CTL to date. Each day carries `target_ctl` + `target_declared`
        (false for gaps / null-target phases, which decay), plus `actual_ctl`/`delta`
        up to today. The summary reports `current_delta`, `delta_trend_14d`, and the
        projected CTL at macrocycle end on plan (`_planned`) vs from the current trajectory
        (`_current`). `macrocycle_id` is optional — omitted resolves the active macrocycle
        (containing today, latest start_date). No active/unknown macrocycle → `404
        macrocycle_not_found`; a macrocycle whose phases declare no target → `200`
        with `trajectory: null` and `reason: "targets_missing"`. Compute-on-read;
        nothing persisted.'
      parameters:
      - description: Macrocycle UUID; omitted resolves the active macrocycle
        in: query
        name: macrocycle_id
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pmc.TargetTrajectory'
        "400":
          description: tz_invalid
          schema:
            additionalProperties: true
            type: object
        "404":
          description: macrocycle_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Planned-vs-actual CTL trajectory for a macrocycle
      tags:
      - performance
  /personal-records:
