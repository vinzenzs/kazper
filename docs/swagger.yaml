    type: object
info:
  contact: {}
  description: Kazper — personal endurance-fueling and training-coach REST API. All
    endpoints under /products, /meals, and /summary require a bearer token.
  title: Kazper
  version: 0.1.0
paths:
  /achievements:
    get:
      parameters:
      - description: 'Filter by kind: badge | challenge'
        in: query
        name: kind
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ achievements: [...] }'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List achievements
      tags:
      - achievements
    post:
      consumes:
      - application/json
      description: Creates or updates an earned badge or ad-hoc challenge, upserting
        by `external_id`. Coaching context only; never feeds nutrition computation.
        Personal records live in the separate personal-records capability.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Achievement
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/achievements.upsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: UPDATE (external_id already present)
          schema:
            $ref: '#/definitions/achievements.Achievement'
        "201":
          description: INSERT
          schema:
            $ref: '#/definitions/achievements.Achievement'
        "400":
          description: external_id_required | kind_invalid | name_required | progress_pct_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Upsert an achievement (by Garmin badge/challenge id)
      tags:
      - achievements
  /athlete-config:
    get:
      description: Returns the single athlete-config row (FTP, thresholds, max HR,
        lactate-threshold HR, HR-zone and optional power-zone boundaries), or null
        before any config has been set. Capture-only mirror; these values feed no
        fueling computation.
      produces:
      - application/json
      responses:
        "200":
          description: '{\"athlete_config\": AthleteConfig | null, \"sources\": [string]}'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the athlete physiology configuration (singleton)
      tags:
      - athlete-config
    put:
      consumes:
      - application/json
      description: 'Full-replace semantics: absent fields are stored as NULL (cleared),
        matching PUT /goals. Every field is optional and must be > 0 when present.
        `Idempotency-Key` is NOT accepted on PUT — supplying the header returns `400
        idempotency_unsupported_for_put`. Garmin is source-of-truth: the daily sync
        re-issues this PUT and overwrites manual edits.'
      parameters:
      - description: Athlete config payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/athleteconfig.AthleteConfig'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"athlete_config\": AthleteConfig}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: athlete_config_value_invalid | invalid_json | idempotency_unsupported_for_put
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden — the garmin identity cannot write the deliberate
            config
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set or replace the athlete physiology configuration (singleton)
      tags:
      - athlete-config
  /athlete-config/effective:
    get:
      description: 'Returns the resolved view computations consume: per field, the
        Garmin-detected value where its source is `garmin` and a detection exists,
        the confirmed value otherwise. `field_sources` annotates each field with `manual`
        or `garmin`. With an empty source policy this equals GET /athlete-config field-for-field.
        Null before any config or applied detection exists.'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"effective\": EffectiveConfig | null}'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the effective physiology config (resolved manual + detected)
      tags:
      - athlete-config
  /athlete-config/garmin-detected:
    get:
      description: Returns the latest physiology Garmin detected (FTP, lactate-threshold
        HR, max HR, run threshold pace, HR/power zone maxima) with `detected_at`,
        or null before any sync has written one. Advisory evidence — NOT the configured
        values; see GET /athlete-config for the deliberate record and GET /athlete-config/effective
        for what computations use.
      produces:
      - application/json
      responses:
        "200":
          description: '{\"garmin_detected\": GarminDetectedThresholds | null}'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Get the latest Garmin-detected thresholds (advisory singleton)
      tags:
      - athlete-config
    put:
      consumes:
      - application/json
      description: Full-replaces the advisory detection singleton with the values
        the daily sync mapped from Garmin. Accepted ONLY from the garmin identity
        (others → 403); writing a detection never reads or mutates athlete_config
        or threshold_history. `Idempotency-Key` is NOT accepted on PUT.
      parameters:
      - description: Detected thresholds payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/athleteconfig.GarminDetectedThresholds'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"garmin_detected\": GarminDetectedThresholds}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: athlete_config_value_invalid | invalid_json | idempotency_unsupported_for_put
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden — only the garmin identity may write detections
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Record the latest Garmin-detected thresholds (garmin identity only)
      tags:
      - athlete-config
  /athlete-config/history:
    get:
      description: Returns the dated snapshots of the athlete-config state, ascending
        by `effective_from`, so threshold progression (e.g. "FTP 240 → 255 → 270 this
        season") is answerable from data. A snapshot is recorded only when a PUT changes
        physiology; the daily Garmin re-PUT of an unchanged config records nothing.
        The seed baseline uses `effective_from = 1970-01-01` (the oldest known state).
        Optional inclusive `from`/`to` bounds filter on `effective_from`. Empty history
        returns `{"history":[]}` (no 404). Pace floats are rounded to 1dp; storage
        keeps full precision.
      parameters:
      - description: Inclusive lower bound on effective_from (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: Inclusive upper bound on effective_from (YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"history\": [ThresholdSnapshot]}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: date_invalid | range_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Dated history of the athlete physiology configuration
      tags:
      - athlete-config
  /athlete-config/sources:
    put:
      consumes:
      - application/json
      description: 'Full-replaces `garmin_sourced_fields` (empty = all manual). Whitelisted
        tokens: `ftp_watts`, `lactate_threshold_hr`, `max_hr`, `threshold_pace_sec_per_km`,
        `hr_zones`, `power_zones` (zones flip as whole sets). Mutates ONLY the policy
        — never the physiology values, never threshold history. Rejected from the
        garmin identity (403). Flipping a source changes the thresholds computations
        use; run POST /workouts/recompute-tss when derived TSS should follow. `Idempotency-Key`
        is NOT accepted on PUT.'
      parameters:
      - description: Source policy payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/athleteconfig.sourcesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{\"sources\": [string]}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: source_field_invalid | invalid_json | idempotency_unsupported_for_put
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden — the garmin identity cannot set the policy
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set the per-field source policy (which fields read from Garmin)
      tags:
      - athlete-config
  /chat:
    post:
      consumes:
      - application/json
      description: Runs a server-side Anthropic agent loop scoped to meal planning
        and streams the result as Server-Sent Events. The request body is `{session_id,
        message}` — an existing chat session and the single new user message; the
        server loads the session's prior turns, persists the new ones, and holds the
        conversation as the source of truth. The response is text/event-stream with
        four event types — `text` (assistant delta), `tool` (id+name+status+summary;
        a call's started and ok/error events share one id so clients coalesce them),
        `done` (final message, stop_reason, usage), and `error` (typed code). Tools
        are dispatched as loopback REST calls under the caller's bearer token. Returns
        503 chat_unavailable when ANTHROPIC_API_KEY is unset, 404 session_not_found
        for an unknown session, and 400 for an empty message.
      parameters:
      - description: Session id + new message
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.ChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: invalid_json | empty_message
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: session_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: chat_unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Stream a nutrition-planning chat turn
      tags:
      - chat
  /chat/sessions:
    get:
      description: Returns session headers (no transcript) most-recent-first by last
        activity.
      produces:
      - application/json
      responses:
        "200":
          description: '{ sessions: [...] }'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List chat sessions
      tags:
      - chat-sessions
    post:
      consumes:
      - application/json
      description: Opens a new conversation. `title` is optional — an absent or empty
        title creates an untitled session (the first /chat turn then names it from
        the opening message). Honors an Idempotency-Key.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Optional title
        in: body
        name: body
        schema:
          $ref: '#/definitions/chatsessions.titleRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/chatsessions.Session'
        "400":
          description: invalid_json | title_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a chat session
      tags:
      - chat-sessions
  /chat/sessions/{id}:
    delete:
      description: Removes the session and cascades its turns.
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: session_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a chat session
      tags:
      - chat-sessions
    get:
      description: Returns the session header plus its ordered turns at full fidelity
        (each turn's role and verbatim content blocks).
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chatsessions.SessionWithMessages'
        "404":
          description: session_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a chat session with its transcript
      tags:
      - chat-sessions
    patch:
      consumes:
      - application/json
      description: Sets the session title. A title of "" (or null) clears it to untitled.
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      - description: New title (\
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chatsessions.titleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/chatsessions.Session'
        "400":
          description: invalid_json | title_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: session_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Rename a chat session
      tags:
      - chat-sessions
  /chat/sessions/{id}/confirm:
    post:
      consumes:
      - application/json
      description: 'Resolves a session whose trailing turn proposed one or more `write-confirm`
        actions (the `/chat` stream ended with `done.stop_reason = "awaiting_confirmation"`
        after a `proposal` event). The body is `{decisions: [{tool_id, approve}]}`
        and MUST cover exactly the pending write-confirm calls. Approved calls (plus
        any read/write-auto calls in the same turn) are dispatched in order; rejected
        calls get a synthetic declined `tool_result`; then the agent loop resumes
        and streams the continuation as Server-Sent Events using the same event contract
        as `/chat`. Idempotency keys are content-derived, so re-sending the same confirmation
        replays rather than double-writes; if a prior resume''s stream died after
        the writes committed (trailing turn is a `tool_result`), re-posting simply
        continues the loop. Returns 404 session_not_found, 409 nothing_to_confirm
        (the session is not paused), or 400 invalid_confirmation (decisions do not
        match the pending calls) — all before any stream is started.'
      parameters:
      - description: Session UUID
        in: path
        name: id
        required: true
        type: string
      - description: Per-call approve/reject decisions
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/chat.ConfirmRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "400":
          description: invalid_json | invalid_confirmation
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: session_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: nothing_to_confirm
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: chat_unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Resume a chat session paused awaiting a write confirmation
      tags:
      - chat
  /coach/memory:
    get:
      description: Standing items (fact/preference/constraint/observation) are returned
        regardless of the window; recommendations are filtered to [from, to] (inclusive
        local dates). Newest-first. Archived and expired items are excluded unless
        include_archived=true. Optional kind/scope filters.
      parameters:
      - description: Inclusive start date YYYY-MM-DD (recommendation window)
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD (recommendation window)
        in: query
        name: to
        required: true
        type: string
