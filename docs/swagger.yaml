  /summary/protein-distribution:
    get:
      description: 'Returns one row per `meal_entries` row on `date`, annotated with
        `mps_effective: bool` (against the 0.3 g/kg body-weight muscle-protein-synthesis
        threshold) plus `logged_at_hour` and `gap_minutes_since_previous` for circadian
        + meal-spacing context. The headline metric is `mps_effective_meal_count /
        meal_count`. Body weight resolution order: explicit `body_weight_kg` query
        param > rolling 7-day mean of stored entries ending at `date` (inclusive)
        > most-recent stored entry strictly before `date`. With no stored data and
        no override, returns `400 weight_data_missing`.'
      parameters:
      - description: Calendar date in YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
