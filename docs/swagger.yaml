        schema:
          $ref: '#/definitions/products.createRecipeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/products.createRecipeResponse'
        "400":
          description: components_required | component_quantity_g_invalid | recipe_as_component_not_supported
            | invalid_json
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: component_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a composite recipe product
      tags:
      - products
  /products/recipes/{id}/recompute:
    post:
      parameters:
      - description: Recipe product UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/products.createRecipeResponse'
        "400":
