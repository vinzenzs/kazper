  /workouts/{id}/compliance:
    get:
      description: Scores how a completed, template-linked workout was executed against
        its effective program (template steps + slot overrides + athlete-config zone→absolute
        resolution), step by step. Expands repeat groups into a flat executed-step
        sequence and matches laps (splits) to steps positionally; each step reports
        its resolved target vs the lap's actual (in_band/under/over with a signed
        delta + deviation_pct), planned-vs-actual duration, and a 0–100 step score,
        aggregated into an overall planned-duration-weighted score. Returns `status:"unavailable"`
        (200) when the lap count does not equal the expanded step count. Compute-on-read
        — nothing is persisted.
      parameters:
      - description: Workout id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutcompliance.Result'
        "400":
          description: workout_id_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: workout_not_completed | multisport_unsupported | no_template_link
            | splits_missing
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Per-step execution compliance for a completed workout
      tags:
      - workouts
  /workouts/{id}/fueling:
    get:
      description: 'Returns three time-anchored buckets (pre / intra / post), each
        carrying three separate sub-objects of intake around a workout: `nutrition`
        (from meals), `hydration` (from hydration entries), and `workout_fuel` (from
        workout-fuel entries — gels / electrolyte drinks / caffeine). Aggregation
        is by `logged_at` time-window matching, NOT by the `workout_id` tag on intake
        rows — an untagged meal in the pre-window still contributes. Sub-objects are
        unit-isolated: no ml inside `nutrition.totals`, no kcal inside `hydration`
        or `workout_fuel`.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Pre-window length in minutes (default 240, range 0..720)
        in: query
        name: pre_window_min
        type: integer
      - description: Post-window length in minutes (default 60, range 0..720)
        in: query
        name: post_window_min
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutfueling.WorkoutFueling'
        "400":
          description: window_invalid
          schema:
            additionalProperties: true
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Workout fueling: pre / intra / post windows'
      tags:
      - workouts
  /workouts/{id}/fueling-plan:
    get:
      description: 'For a PLANNED workout, estimates the session''s work and carbohydrate
        burn and prescribes intake. Work: `kJ = planned_tss / 100 × effective FTP
        × 3.6` (exact under the TSS definition), with energy per the standard cycling
        kJ≈kcal convention. Carb burn: kcal × a CHO fraction selected by planned IF
        (`< 0.60` → 45%, `0.60–0.75` → 55%, `0.75–0.85` → 70%, `> 0.85` → 80%; IF
        derived as `sqrt(planned_tss/100 ÷ hours)`) ÷ 4 kcal/g. Intake: the duration
        ladder (`< 60 min` → 0, `60–150 min` → 30–60 g/hr, `> 150 min` → 60–90 g/hr),
        its ceiling clamped by the optional `carbs_per_hr` capacity (the athlete''s
        tested gut tolerance — discovered in rehearsal, not by this endpoint). `projected_deficit_g`
        is burn minus the maximum prescribed intake: the number that says whether
        post-ride carbs need emphasis. Every input behind the numbers is echoed. Degradations
        state what they lack: no planned TSS and no duration → `plan_data_missing`;
        duration without TSS, or missing effective FTP → the intake ladder without
        a burn estimate (`tss_missing` / `ftp_missing`). A non-planned workout returns
        409 — the pre-session question is the product. Compute-on-read: persists nothing,
        feeds no daily nutrition total. These are conventions and a planning anchor,
        not a metabolic lab.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Tested gut capacity in g/hr (> 0, <= 130); clamps the prescription's
          upper bound
        in: query
        name: carbs_per_hr
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutfueling.FuelingPlan'
        "400":
          description: carbs_per_hr_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: workout_not_planned
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Planned workout fueling plan: burn estimate + intake prescription'
      tags:
      - workouts
  /workouts/{id}/fulfill:
    post:
      consumes:
      - application/json
      description: 'Merges an existing completed activity (`completed_id`) into the
        planned workout at `{id}`: copies the activity''s external_id, source, and
        actual metrics onto the planned row, flips it to `completed`, removes the
        redundant standalone completed row, and clears any needs-link flag. The planned
        row survives so its `plan_slot_id` stays stable. Used for the ambiguous/cross-day
        cases auto-reconciliation declines.'
      parameters:
      - description: Planned workout UUID (the merge target)
        in: path
        name: id
        required: true
        type: string
      - description: '{ completed_id }'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouts.fulfillRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouts.Workout'
        "400":
          description: invalid_json | completed_id_invalid | planned_workout_required
            | completed_workout_required | sport_mismatch
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Fulfill a planned workout with a completed activity
      tags:
      - workouts
  /workouts/{id}/intervals:
    get:
      description: 'Detects sustained work efforts in the workout''s stored 1 Hz power
        stream with a deterministic, parameter-free procedure: a 30-second centered
        rolling mean, a work/rest threshold derived from the ride''s own smoothed
        power distribution by Otsu''s method (reported as `threshold_w`), merging
        of work spans separated by ≤ 30 s, and discarding of assembled spans shorter
        than 60 s. Returns each interval''s `n`/`start_s`/`end_s`/`duration_s`/`avg_w`/`max_w`/`kj`
        (avg/max/kj over the raw stream), the rest gaps between them, and a summary.
        A ride whose smoothed power isn''t meaningfully bimodal returns `200` with
        `threshold_w: null`, `intervals: []`, and `reason: "no_distinct_efforts"`.
        Cycling power only. Compute-on-read; nothing persisted.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.IntervalsResult'
        "404":
          description: workout_not_found | streams_not_found | power_stream_missing
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Detect work intervals from a stored power stream
      tags:
      - workouts
  /workouts/{id}/program:
    get:
      description: Resolves the workout's template steps with its plan-slot target
        and duration overrides applied per intent. A workout with no template returns
        its sport/name and an empty step list. A multisport workout returns sport
        "multisport" and an ordered `segments` list — each segment with its own sport
        and resolved steps (or a transition's duration) — instead of a flat step list.
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/trainingplan.Program'
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a planned workout's effective program (template steps + slot target/duration
        overrides)
      tags:
      - workouts
  /workouts/{id}/quadrant:
    get:
      description: 'Classifies each pedaling sample of the workout''s stored power
        + cadence streams into a Coggan force/velocity quadrant. Per sample: `CPV
        = cadence × crank × 2π/60` (m/s) and `AEPF = power / CPV` (N), split at the
        reference point implied by `cp_watts` at `cadence_rpm` (crank default 172.5
        mm). Returns the share of pedaling time in each quadrant (I high-force/high-velocity
        … IV low-force/high-velocity), pedaling vs excluded (coasting/dropout) seconds,
        the reference point, and a downsampled scatter (≤1000 points; omitted under
        `summary_only=true`). `cp_watts` and `cadence_rpm` are explicit params (compose
        with `cp_model` + the athlete''s cadence — no config coupling). Cycling power+cadence
        only. Compute-on-read; nothing persisted.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Critical power / threshold in watts (> 0)
        in: query
        name: cp_watts
        required: true
        type: number
      - description: Reference (self-selected) cadence in rpm (> 0)
        in: query
        name: cadence_rpm
        required: true
        type: number
      - description: Crank length in mm (default 172.5; 100–220)
        in: query
        name: crank_mm
        type: number
      - description: Omit the scatter, return shares only
        in: query
        name: summary_only
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.QuadrantResult'
        "400":
          description: cp_invalid | cadence_invalid | crank_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found | streams_not_found | power_stream_missing
            | cadence_stream_missing
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Force/velocity quadrant analysis from power + cadence streams
      tags:
      - workouts
  /workouts/{id}/streams:
    get:
      description: Returns the workout's stored 1 Hz streams keyed by type (absent
        types omitted). Pass `downsample=N` (10..5000) to bucket-mean each series
        down to N points for charting; `duration_s` always reflects the full-resolution
        activity length.
      parameters:
      - description: Workout id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: Bucket-mean each series down to N points (10..5000)
        in: query
        name: downsample
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.StreamsResponse'
        "400":
          description: downsample_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found | streams_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Retrieve a workout's stored streams
      tags:
      - workouts
    post:
      consumes:
      - application/json
      description: Persists contiguous 1 Hz power (W), speed (m/s) and/or heart_rate
        (bpm) sample arrays for a completed workout (replacing any prior streams),
        refreshes the mean-maximal best-effort ladder, and derives + stores the execution
        metrics (variability_index, efficiency_factor, decoupling_pct) onto the workout.
        An empty body writes nothing. Streams are workout-only and feed no nutrition
        total.
      parameters:
      - description: Workout id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: 1 Hz power/speed/heart_rate sample arrays
        in: body
        name: streams
        required: true
        schema:
          $ref: '#/definitions/activitystreams.StreamPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.IngestResult'
        "400":
          description: invalid_body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ingest a workout's raw sample streams
      tags:
      - workouts
  /workouts/{id}/streams/recompute:
    post:
      description: Reloads the workout's stored streams and rewrites the best-effort
        ladder and execution metrics (variability_index, efficiency_factor, decoupling_pct)
        from them, without a re-post. Used after a metric-formula change or a partial
        earlier ingest.
      parameters:
      - description: Workout id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.RecomputeResult'
        "404":
          description: workout_not_found | streams_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Recompute stream-derived metrics from stored streams
      tags:
      - workouts
  /workouts/{id}/sweat-rate:
    get:
      description: 'Computes sweat rate (ml/hr) over a completed workout: `sweat_loss_ml
        = (pre_weight_kg − post_weight_kg) × 1000 + fluid_ml`, divided by the workout''s
        elapsed hours. Pre/post weights are REQUIRED positive params — the bodyweight
        log is daily-grained, not pre/post-session. Fluid is summed from the workout''s
        linked hydration and workout-fuel `quantity_ml` entries and itemized in the
        response; an optional `fluid_ml_override` (≥ 0) replaces the derived sum for
        the unlogged-bottle case. A planned workout returns 409; a negative loss or
        a rate above 5000 ml/hr still returns the numbers with `warning: "implausible_result"`.
        Compute-on-read: persists nothing, feeds no daily hydration or nutrition total.'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      - description: Pre-session body weight (kg, positive)
        in: query
        name: pre_weight_kg
        required: true
        type: number
      - description: Post-session body weight (kg, positive)
        in: query
        name: post_weight_kg
        required: true
        type: number
      - description: Override for in-session fluid (ml, ≥ 0); replaces the derived
          hydration + workout-fuel sum
        in: query
        name: fluid_ml_override
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutfueling.SweatRate'
        "400":
          description: pre_weight_invalid / post_weight_invalid / fluid_override_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: workout_not_completed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Workout sweat rate: the standard field test'
      tags:
      - workouts
  /workouts/{id}/unfulfill:
    post:
      description: 'Reverses a merge: clears the workout''s external_id and actual
        metrics and restores `status=''planned''`, retaining `template_id` and `plan_slot_id`.
        The activity is not re-fetched; the next Garmin sync re-imports it as a fresh
        standalone row. Errors unless the workout is a fulfilled planned row (completed
        with a plan_slot_id).'
      parameters:
      - description: Workout UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouts.Workout'
        "400":
          description: workout_not_fulfilled
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reverse a fulfilled workout back to planned
      tags:
      - workouts
  /workouts/{id}/w-prime-balance:
    get:
      description: 'Computes the differential (Froncioni–Clarke–Skiba) W′-balance
        time series over the workout''s stored 1 Hz power stream, given caller-supplied
        critical-power model parameters `cp_watts` and `w_prime_kj` (typically from
        GET /workouts/cp-model). Returns `params` (echoed), `duration_s`, a `summary`
        (minimum balance + when, end balance, max depletion %, seconds below 25% W′),
        and the `series` (W′bal in kJ per point). `summary_only=true` omits the series;
        `downsample=N` (10..5000) bucket-means the series for charting (the exact
        minimum always lives in the summary). The balance is NOT clamped at zero —
        a negative floor / >100% depletion means the supplied W′ is too low (re-fit
        via cp-model). Advisory: reads no athlete-config. Compute-on-read; nothing
        persisted.'
      parameters:
      - description: Workout id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: Critical power (W), > 0
        in: query
        name: cp_watts
        required: true
        type: number
      - description: Anaerobic work capacity W′ (kJ), > 0
        in: query
        name: w_prime_kj
        required: true
        type: number
      - description: Omit the series, return params + summary only
        in: query
        name: summary_only
        type: boolean
      - description: Bucket-mean the series down to N points (10..5000)
        in: query
        name: downsample
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/activitystreams.WPrimeBalanceResult'
        "400":
          description: cp_invalid | w_prime_invalid | downsample_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: workout_not_found | streams_not_found | power_stream_missing
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Per-workout W′ balance over the stored power stream
      tags:
      - workouts
  /workouts/adherence:
    get:
      description: 'Classifies each workout in [from, to] as completed (a planned
        session that was done), missed (a planned session now overdue), upcoming (planned,
        not yet due), or unplanned (completed with no plan slot). Returns the four
        counts, `adherence_rate` = completed / (completed + missed) over due sessions
        only (null when none due), planned-vs-actual `duration_min`/`tss`, and a `by_sport`
        completed/missed breakdown. Also returns `missed_sessions` — a compact, oldest-first
        list of the overdue sessions (id/date/sport/planned_duration_min/planned_tss),
        capped with `missed_sessions_truncated` when the tail is dropped — and `weekly`,
        a per-week trend. Weekly buckets are plan-week-aware: with `plan_id` they
        align to the plan''s weeks (`ordinal` + `phase`, `week_start` from the plan
        start date); without, they are Monday-started calendar weeks. "Now" is the
        server clock in the resolved timezone. When `plan_id` is supplied the window
        is restricted to that plan''s slots (off-plan rows excluded). Read-only.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD (local)
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD (local); max 92-day span
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      - description: Restrict to workouts whose plan slot belongs to this plan UUID
        in: query
        name: plan_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workouts.AdherenceSummary'
        "400":
          description: window_required | window_invalid | range_too_large | tz_invalid
            | plan_id_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Plan-adherence analytics over a date window
      tags:
      - workouts
  /workouts/bulk:
    post:
      consumes:
      - application/json
      description: Each item upserts independently using external_id semantics, and
        may carry nested `splits` / `sets` arrays (written transactionally with the
        parent, replaced on re-sync). Per-item validation/persistence failures are
        reported in the results array; the overall response is 200 whenever the request
        body is well-formed and within the size cap. Partial failure is allowed.
      parameters:
      - description: '{ workouts: [Workout, ...] }'
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/workouts.bulkCreateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: '{ results: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: bulk_invalid | bulk_empty | bulk_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Upsert a batch of workouts (max 100 per request)
      tags:
      - workouts
  /workouts/cp-model:
    get:
      description: 'Fits the 2-parameter critical-power model to the window''s best-effort
        records (bike **power** only): for each ladder duration between 2 and 30 minutes
        it takes the windowed best (the same per-duration MAX the power curve serves)
        as one fit point and computes an OLS fit in work–time form, returning `model`
        with `cp_watts`, `w_prime_kj`, `r_squared`, `rmse_w` plus the `points` used.
        The model is **advisory** — this endpoint never reads or writes athlete-config;
        comparing CP against the configured FTP is the caller''s job. When the window
        can''t support a fit the response is still `200` with `model: null` and a
        `reason` (`insufficient_points` / `span_too_narrow`). A fit whose `r_squared`
        is below 0.5 is returned but flagged `warning: "poor_fit"` — treat its CP/W′
        as unreliable. Only bike workouts'' efforts enter the fit (running power is
        excluded). Compute-on-read; nothing persisted. Range capped at 400 days.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/effortanalytics.CPModelResult'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Critical-power (CP2) model over a window
      tags:
      - workouts
  /workouts/cp-model/history:
    get:
      description: 'Fits the 2-parameter critical-power model at each Monday anchor
        in `[from, to]`, each over its trailing `window_days` (default 90, bounds
        [30, 365]) — the CP-over-time trend, the data-derived counterpart to the configured-FTP
        history. Per anchor: the fitted `model` (or `null` with the gate `reason`
        when the trailing window can''t support a fit — the trend gaps, it doesn''t
        zero). Advisory — this endpoint never reads or writes athlete-config. Compute-on-read;
        nothing persisted. Range capped at 400 days.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      - description: Trailing fit window per anchor in days (default 90; 30–365)
        in: query
        name: window_days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/effortanalytics.CPModelHistoryResult'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid | window_days_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Critical-power (CP2) model fitted at weekly anchors over a range
      tags:
      - workouts
  /workouts/durability:
    get:
      description: 'For each durability duration (1m/5m/20m), the fresh (tier-0) windowed
        best power vs the best power whose window starts after 500/1000/1500/2000
        kJ of accumulated work, with `fade_pct = (fresh − tier)/fresh × 100` and each
        entry''s contributing workout/date. Tiers with no data in the window are omitted;
        a window holding only fresh rows returns `reason: "no_tiered_data"` (historical
        rides gain tiers only after their streams are re-run through the recompute
        path). Cycling power only. Compute-on-read over stored best-effort rows (no
        stream scans); nothing persisted. Range capped at 400 days.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/effortanalytics.DurabilityResult'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Fatigue-resistance (durability) fade table over a window
      tags:
      - workouts
  /workouts/intensity-distribution:
    get:
      description: 'Aggregates completed workouts'' stored HR-zone seconds (secs_in_zone_1..5)
        in `[from, to]` into per-zone shares: a window total with band collapse (low=Z1+Z2,
        moderate=Z3, high=Z4+Z5) and a classification label (polarized | pyramidal
        | threshold | mixed | null), a by-sport breakdown, and a Monday-start weekly
        trend (buckets only for weeks with a completed workout; edge weeks clipped
        to the window). Also returns a by_training_focus session-count axis + unclassified_focus_count.
        A completed workout with all-null zones is excluded from sums but counted
        (missing_zone_data_count, per-week + window). Zone shares are computed over
        total_zone_secs (zoned time, not elapsed); share_pct is omitted when a group
        has no zone time. Planned excluded. Range capped at 400 days. Read-only. Distinct
        from and never merged into the volume summary or any nutrition total.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutstats.Distribution'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Time-in-zone intensity distribution across a date range
      tags:
      - workouts
  /workouts/power-curve:
    get:
      description: 'Returns, per ladder duration, the best (max) mean value achieved
        across completed workouts in `[from, to]`, with the contributing workout id
        and date. Metric is derived from `sport`: cycling → power (W), run/swim →
        speed (m/s, rendered as pace by clients). Only workouts of the requested sport
        contribute — a run''s running-power rows never enter the bike curve, and a
        bike''s speed rows never enter run/swim pace curves; multisport workouts match
        no sport-scoped window. Range capped at 400 days. Empty window returns an
        empty points list.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: bike (→power) | run | swim (→speed); defaults to bike
        in: query
        name: sport
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/effortanalytics.Curve'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Mean-maximal power/pace curve over a window
      tags:
      - workouts
  /workouts/power-profile:
    get:
      description: 'Ranks the athlete''s windowed best power efforts at four benchmark
        durations — 5 s (neuromuscular), 1 min (anaerobic), 5 min (VO₂max), and the
        20-min best as a functional-threshold proxy (no 0.95 haircut) — against the
        embedded Coggan power-profile tables. Each anchor carries `watts`, `w_per_kg`,
        the Coggan `category` band, an interpolated `percentile` (0–100, an **estimate**
        — the category is authoritative), and the contributing workout. `phenotype`
        (sprinter / time_trialist / climber / all_rounder) is null unless all four
        anchors are present. W/kg denominator: the `weight_kg` query param (> 0),
        else the most-recent stored body weight, else `400 weight_data_missing`; the
        response echoes `weight_source`. `sex` selects the table (male default). **Advisory**
        — never reads or writes athlete-config. Power only. Compute-on-read; nothing
        persisted. Range capped at 400 days.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      - description: Body-weight override in kg (> 0); falls back to the latest stored
          weight
        in: query
        name: weight_kg
        type: number
      - description: male (default) | female — selects the Coggan table
        in: query
        name: sex
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/effortanalytics.PowerProfileResult'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid | weight_kg_invalid | sex_invalid | weight_data_missing
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Power-profile ranking against the Coggan tables
      tags:
      - workouts
  /workouts/recompute-tss:
    post:
      description: Re-runs the ingest-time per-sport TSS derivation over every completed
        workout whose `tss` is NULL or whose `tss_source` is a computed value (`power`,
        `pace`, `hr`), against the CURRENT athlete-config thresholds. Measured rows
        (`tss_source` `garmin`/`manual`) are never touched. A candidate may gain,
        change, or lose (cleared to NULL) its computed value. Idempotent for a fixed
        data + threshold state. Returns per-provenance counts of the rows updated
        (`none` = cleared to NULL).
      produces:
      - application/json
      responses:
        "200":
          description: '{\"examined\": n, \"updated\": n, \"by_source\": {\"power\":
            n, \"pace\": n, \"hr\": n, \"none\": n}}'
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Recompute derived TSS across completed workouts
      tags:
      - workouts
  /workouts/summary:
    get:
      description: Aggregates completed workouts in `[from, to]` into a per-day series
        (one bucket per calendar day, zero-filled) plus a window total, each carrying
        count, total duration (min), total distance (m), total elevation gain (m),
        total kcal, and a by-sport count breakdown. Distance/elevation/duration are
        workout-only and are never merged into nutrition totals. Planned workouts
        are excluded. Nullable metrics are summed present-only. Range is capped at
        400 days so year-to-date is supported.
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone (defaults to DEFAULT_USER_TZ)
        in: query
        name: tz
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/workoutstats.Summary'
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
            | tz_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Workout volume totals across a date range
      tags:
      - workouts
securityDefinitions:
  BearerAuth:
    description: Static bearer token. Use the format `Bearer <token>` with either
      MOBILE_API_TOKEN or AGENT_API_TOKEN.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
