            additionalProperties: true
            type: object
        "502":
          description: garmin_bridge_unreachable
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: garmin_disabled
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Submit the Garmin bridge MFA code (proxy)
