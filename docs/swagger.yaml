            additionalProperties: true
            type: object
        "502":
          description: garmin_bridge_unreachable | garmin_error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: garmin_disabled
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Push logged hydration back to Garmin (opt-in write)
