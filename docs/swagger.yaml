          schema:
            additionalProperties:
              type: string
            type: object
        "502":
          description: upstream_unexpected_response
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: upstream_timeout
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Look up a product by barcode
      tags:
      - products
  /products/recipes:
    post:
      consumes:
      - application/json
      description: Builds a recipe from N component products and per-component grams.
        Nutriments-per-100g are computed at creation time from components, so existing
        meal-logging math works unchanged.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
