      description: 'Per-day EA values + window aggregate, computed from meals (intake),
        workouts (exercise burn) and body weight (composition). Loucks bands: `< 30
        kcal/kg FFM/day = low`, `30-45 = sub_optimal`, `>= 45 = adequate`. FFM resolution
        order: lean_mass_kg query param → body_fat_pct query param + stored body weight
        → most-recent in-window stored body_fat_pct → 85% fallback (loud, flagged
        via `composition.composition_estimated`). Days with workouts missing `kcal_burned`
        are listed in `missing_burn_workout_ids` and excluded from `window.avg_ea`.'
      parameters:
      - description: Inclusive RFC3339 lower bound
        in: query
        name: from
        required: true
        type: string
      - description: Exclusive RFC3339 upper bound; max 92 days from 'from'
        in: query
        name: to
        required: true
        type: string
      - description: IANA timezone for calendar-day boundaries; defaults to DEFAULT_USER_TZ
        in: query
        name: tz
        type: string
      - description: Explicit FFM override (highest-trust); > 0
        in: query
        name: lean_mass_kg
        type: number
      - description: Explicit body-fat % override; 0 <= x < 100
        in: query
        name: body_fat_pct
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/energy.Availability'
        "400":
          description: window_required | window_invalid | range_too_large | tz_invalid
            | lean_mass_kg_invalid | body_fat_pct_invalid | weight_data_missing
          schema:
            additionalProperties: true
            type: object
