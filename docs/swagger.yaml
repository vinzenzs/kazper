    type: object
  dailycontext.WeightBlock:
    properties:
      bmi:
        type: number
      body_fat_pct:
        type: number
      body_water_pct:
        type: number
      bone_mass_kg:
        type: number
      is_carryover:
        type: boolean
      logged_at:
        type: string
      muscle_mass_kg:
        type: number
      weight_kg:
        type: number
    type: object
  dailycontext.WorkoutFuelLite:
    properties:
      caffeine_mg:
        type: number
      carbs_g:
        type: number
      id:
        type: string
      logged_at:
        type: string
      name:
        type: string
      potassium_mg:
        type: number
      quantity_ml:
        type: number
      sodium_mg:
        type: number
      workout_id:
        type: string
    type: object
  dailycontext.WorkoutLite:
    properties:
      duration_min:
        type: number
      ended_at:
