      tags:
      - products
  /products/search:
    get:
      description: Case-insensitive substring match across product name and brand.
        Returns up to 50 results.
      parameters:
      - description: Substring to search for
        in: query
        name: q
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ results: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: q_required
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Search products
      tags:
      - products
  /public/race-feed:
    get:
      description: 'The only unauthenticated data route: a curated projection of the
        active macrocycle''s A-race (name, date, and a computed countdown) for an
        external Strapi shield to cache and re-serve publicly. Requires header `X-Feed-Key`
        equal to `FEED_SECRET` (compared in constant time) — this is NOT a bearer
        identity and grants access to nothing else. Returns `503 feed_disabled` when
        `FEED_SECRET` is unset, `401 feed_unauthorized` on a missing/wrong key. When
        there is no active anchored race the body degrades to `{"race": null, "days_remaining":
        null}`. No PII is ever returned.'
      parameters:
      - description: Shared feed secret (equals FEED_SECRET)
        in: header
        name: X-Feed-Key
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"race\": {\"name\": \"...\", \"race_date\": \"YYYY-MM-DD\"}
            | null, \"days_remaining\": <int> | null}'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: feed_unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: feed_disabled
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Public race feed (secret-gated, non-PII)
      tags:
      - public-feed
  /push/tokens:
    delete:
      consumes:
      - application/json
      description: Drops the supplied device token (e.g. on sign-out). Restricted
        to the `mobile` identity. Removing an unknown token is a no-op.
      parameters:
      - description: FCM registration token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/push.tokenRequest'
      produces:
      - application/json
      responses:
        "204":
          description: no content
        "400":
          description: invalid_json | token_required
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove a device push token (mobile identity only)
      tags:
      - push
    post:
      consumes:
      - application/json
      description: 'Upserts the device''s FCM registration token so the backend can
        deliver notifications (today: Garmin relogin). Idempotent by token. Restricted
        to the `mobile` identity. Accepts and stores the token even when push is unconfigured,
        so enabling FCM later delivers without re-pairing.'
      parameters:
      - description: FCM registration token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/push.tokenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/push.PushToken'
        "400":
          description: invalid_json | token_required
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Register a device push token (mobile identity only)
      tags:
      - push
  /race-prep/carb-load:
    get:
      description: 'Stateless, deterministic carb-load math: given a race date and
        a body weight, returns daily carbohydrate targets for the load window and
        race morning. No persistence. The natural follow-up is to translate each entry
        into a goal override via `PUT /goals/overrides/{date}`.'
      parameters:
      - description: Race date YYYY-MM-DD (must be today or later in DEFAULT_USER_TZ)
        in: query
        name: race_date
        required: true
        type: string
      - description: Athlete body weight in kilograms, 30..200
        in: query
        name: body_weight_kg
        required: true
        type: number
      - description: Carb-load days before race day, 0..7 (default 3)
        in: query
        name: days_before
        type: integer
      - description: Load-day multiplier, 1..20 g/kg (default 10)
        in: query
        name: carbs_per_kg_per_day
        type: number
      - description: Race-morning multiplier, 0..10 g/kg (default 2)
        in: query
        name: race_day_carbs_per_kg
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/raceprep.CarbLoadSchedule'
        "400":
          description: race_date_required | body_weight_kg_required | race_date_invalid
            | race_date_in_past | body_weight_kg_invalid | days_before_invalid | carbs_per_kg_per_day_invalid
            | race_day_carbs_per_kg_invalid
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Compute a carb-load schedule for a race
      tags:
      - race-prep
  /race-prep/carb-load/apply:
    post:
      consumes:
      - application/json
      description: Same inputs as `GET /race-prep/carb-load`. Computes the schedule,
        then in a single transaction writes the per-day carb target into the `daily_goal_overrides`
        row for each schedule date — merging into existing overrides (preserving non-carb
        fields) or creating new rows. Returns the schedule plus a per-date `applied`
        outcome (`{date, carbs_g_min, created}`). On any per-date failure the whole
        transaction rolls back and zero overrides are persisted.
      parameters:
      - description: Carb-load parameters (same as the GET endpoint)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/raceprep.applyRequestBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/raceprep.ApplyResponse'
        "400":
          description: race_date_required | body_weight_kg_required | race_date_invalid
            | race_date_in_past | body_weight_kg_invalid | days_before_invalid | carbs_per_kg_per_day_invalid
            | race_day_carbs_per_kg_invalid | invalid_json
          schema:
            additionalProperties: true
            type: object
        "500":
          description: apply_failed
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Compute AND apply a carb-load schedule into per-date goal overrides
      tags:
      - race-prep
  /race-prep/recommend-workout-fuel:
    get:
      description: Stateless literature-grounded fueling recommendation for one training
        or race session. Accepts EITHER `workout_id` (pulls sport/duration/intensity
        from the row, deriving intensity zone from `tss` when present) OR the explicit
        triplet `sport`+`duration_min`+`intensity_zone`. Body weight resolved via
        the four-tier rule (explicit override > rolling 7d stored mean > most-recent
        stored entry > 400). Reuses the 0.3 g/kg MPS threshold from `protein_distribution`
        for the post-workout protein recommendation.
      parameters:
      - description: Workout UUID — pulls sport/duration/intensity from the row
        in: query
        name: workout_id
        type: string
      - description: Sport (bike|run|swim|strength|other). Required in explicit mode.
        in: query
        name: sport
        type: string
      - description: Duration in minutes (>0). Required in explicit mode.
        in: query
        name: duration_min
        type: integer
      - description: Zone 1–5. Required in explicit mode.
        in: query
        name: intensity_zone
        type: integer
      - description: Explicit body-weight override (>0). Otherwise resolved from stored
          entries.
        in: query
        name: body_weight_kg
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/raceprep.FuelRecommendation'
        "400":
          description: input_required | input_conflict | sport_required | duration_min_required
            | intensity_zone_required | sport_invalid | duration_min_invalid | intensity_zone_invalid
            | body_weight_kg_invalid | weight_data_missing | workout_id_invalid
          schema:
            additionalProperties: true
            type: object
        "404":
          description: workout_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Pre/intra/post fueling recommendation for a single session
      tags:
      - race-prep
  /races:
    get:
      parameters:
      - description: Filter to races with this A/B/C priority
        in: query
        name: priority
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{ races: [...] }'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: race_priority_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List races
      tags:
      - races
    post:
      consumes:
      - application/json
      description: Persists a race (name + date) and its ordered legs. Each leg is
        `{ordinal, discipline, distance_m?, expected_duration_min?, intensity?}`;
        `discipline` is one of swim|bike|run|transition|other and `ordinal` must be
        unique within the race. This is a planning entity — the per-leg fuelling plan
        is computed separately via GET /races/{id}/fueling-plan.
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Race + legs
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/races.createRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/races.Race'
        "400":
          description: race_name_required | race_date_invalid | notes_too_long | race_priority_invalid
            | leg_ordinal_duplicate | leg_discipline_invalid | leg_expected_duration_min_invalid
            | leg_distance_m_invalid
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a race with legs
      tags:
      - races
  /races/{id}:
    delete:
      parameters:
      - description: Race UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "404":
          description: race_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a race (legs cascade)
      tags:
      - races
    get:
      parameters:
      - description: Race UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/races.Race'
        "404":
          description: race_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a race with its legs
      tags:
      - races
    patch:
      consumes:
      - application/json
      description: 'Updates the supplied scalar fields. If a `legs` array is present,
        it REPLACES all existing legs wholesale (an empty array clears them); omit
        `legs` to leave them unchanged. `priority` is tri-state: `"A"|"B"|"C"` sets
        it, `""` clears it to null, and omitting the key leaves it unchanged.'
      parameters:
      - description: Race UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/races.patchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/races.Race'
        "400":
          description: race_name_required | race_date_invalid | notes_too_long | race_priority_invalid
            | leg_ordinal_duplicate | leg_discipline_invalid | leg_expected_duration_min_invalid
            | leg_distance_m_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: race_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a race (and optionally replace its legs)
      tags:
      - races
  /races/{id}/fueling-plan:
    get:
      description: Deterministic per-leg in-event fuelling baseline computed on read
        (not stored). Carbs band by total race duration (<75 min → 0, 75–150 → 60,
        ≥150 → 90 g/hr) and scale by discipline intake capacity (swim/transition 0,
        bike 1.0, run 0.7, other 0.8). Fluid and sodium derive from `sweat_rate_ml_per_hr`
        when supplied (fluid capped at 1000 ml/hr; sodium = sweat_rate/1000 × 800
        mg/L), else a flagged 600 ml/hr and 600 mg/hr. Carbs (g), sodium (mg) and
        fluid (ml) are reported as distinct unit fields.
      parameters:
      - description: Race UUID
        in: path
        name: id
        required: true
        type: string
      - description: Athlete body weight in kilograms, 30..200
        in: query
        name: body_weight_kg
        required: true
        type: number
      - description: Measured sweat rate in ml/hr; personalises fluid and sodium
        in: query
        name: sweat_rate_ml_per_hr
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/races.FuelingPlan'
        "400":
          description: body_weight_kg_required | body_weight_kg_out_of_range | sweat_rate_out_of_range
            | sweat_rate_invalid
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: race_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Compute the per-leg fuelling plan for a race
      tags:
      - races
  /races/{id}/pacing-plan:
    get:
      description: 'Computes, per race leg, a duration-banded intensity target from
        the athlete-config thresholds: bike legs a power band as a % of `ftp_watts`,
        run legs a pace band vs `threshold_pace_sec_per_km`, swim legs a pace band
        per 100 m vs `threshold_swim_pace_sec_per_100m` (CSS). Each leg carries a
        `source` (computed/override/none), per-leg `intensity_factor` and `estimated_tss`,
        and a `rationale`; the race carries `estimated_tss_total`, `tss_complete`,
        and a `missing_thresholds` union. Unset thresholds degrade the affected legs
        only (still 200). Compute-on-read; nothing computed is persisted. Power lives
        only in `_w` fields, run pace in `_sec_per_km`, swim pace in `_sec_per_100m`
        (unit isolation).'
      parameters:
      - description: Race id (uuid)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/racepacing.PacingPlan'
        "404":
          description: race_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Per-leg race pacing plan
      tags:
      - races
  /races/{id}/pacing-plan/overrides/{ordinal}:
    delete:
      description: Removes the leg's stored override; the leg reverts to the computed
        band on the next read.
      parameters:
      - description: Race id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: Leg ordinal
        in: path
        name: ordinal
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: race_not_found | override_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Clear a race leg's manual pacing override
      tags:
      - races
    put:
      consumes:
      - application/json
      description: 'Full-replaces the pacing override for one leg, keyed by the leg''s
        ordinal so it survives the wholesale leg-replacement of `PATCH /races/{id}`.
        Exactly one unit family (both low and high) must be populated and must match
        the leg''s discipline: `target_power_*_w` for a bike leg, `target_pace_*_sec_per_km`
        for a run leg, `target_pace_*_sec_per_100m` for a swim leg. An `Idempotency-Key`
        header is rejected (PUT is full-replace).'
      parameters:
      - description: Race id (uuid)
        in: path
        name: id
        required: true
        type: string
      - description: Leg ordinal
        in: path
        name: ordinal
        required: true
        type: integer
      - description: One unit-family band matching the leg's discipline
        in: body
        name: override
        required: true
        schema:
          $ref: '#/definitions/racepacing.OverrideInput'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: override_discipline_mismatch | override_target_required | override_unit_conflict
            | override_band_invalid | idempotency_unsupported_for_put
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: race_not_found | leg_not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Set a race leg's manual pacing override
      tags:
      - races
