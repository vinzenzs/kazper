      description: 'Accepts `name`, `notes`, `kcal_burned`, `avg_hr`, `tss`, `rpe`,
        `gi_distress_score`, `training_focus`, `environment`, `distance_m`, `avg_power_w`,
        `temperature_c`, `sweat_loss_ml`, `session_group`. `source`, `external_id`,
