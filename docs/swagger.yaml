  /locations:
    get:
      description: 'Returns every period intersecting `[from, to]` (inclusive) ascending
        by `start_date`. Overlap, not containment: a camp starting before the window
        and ending inside it is still returned. `200` with an empty array when none.
        Range capped at 400 days.'
      parameters:
      - description: Inclusive start date YYYY-MM-DD
        in: query
        name: from
        required: true
        type: string
      - description: Inclusive end date YYYY-MM-DD; max 400-day span
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"locations\": [Period]}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: range_required | date_invalid | range_invalid | range_too_large
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List location periods overlapping a window
      tags:
      - locations
    post:
      consumes:
      - application/json
      description: 'Records where the athlete is over an inclusive date range, so
        weather/heat reads for those dates resolve to that place instead of home.
        `name`, `lat` (-90..90) and `lon` (-180..180) are required — city-grade coordinates
        are all the forecast needs. Overlapping periods are ACCEPTED: a weekend trip
        nested inside a training camp resolves to the weekend for its dates (latest
        `start_date` wins). No PATCH — corrections and trip extensions are delete
        + re-log. `Idempotency-Key` is supported. Nothing downstream is precomputed,
        so sessions already scheduled in the range follow the trip automatically.'
      parameters:
      - description: Optional client-supplied idempotency key
        in: header
        name: Idempotency-Key
        type: string
      - description: Location period
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/locations.createBody'
      produces:
      - application/json
      responses:
        "201":
          description: '{\"location\": Period}'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: name_required | lat_lon_invalid | date_invalid | range_invalid
            | note_too_long | invalid_json
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log a travel location period
      tags:
      - locations
  /locations/{id}:
    delete:
      description: Removes a period. This is also the correction path — there is no
        PATCH; re-log with the right dates or coordinates.
      parameters:
      - description: Location period UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a location period
      tags:
      - locations
    get:
      parameters:
      - description: Location period UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: '{\"location\": Period}'
          schema:
            additionalProperties: true
            type: object
        "404":
          description: not_found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a location period
      tags:
      - locations
  /locations/resolve:
    get:
      description: 'Returns the one location a date resolves to: the covering travel
        period with the latest `start_date` (`source: "travel"`), else the configured
        home coordinates (`source: "home"`, `name: "home"`), else `404 location_unconfigured`
        when neither exists. This is the SAME primitive every weather consumer reads,
        so when a heat forecast surprises, one call shows which location produced
        it — the endpoint can never disagree with behavior.'
      parameters:
      - description: Date YYYY-MM-DD (defaults to today in the server timezone)
        in: query
