            additionalProperties:
              type: string
            type: object
        "403":
          description: forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: sync_run_not_found
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: garmin_disabled
