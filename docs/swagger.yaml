  /meals/from_photo:
    post:
      consumes:
      - multipart/form-data
      description: Accepts a `multipart/form-data` upload with an `image` part (JPEG
        or PNG; HEIC is rejected with 415 in v1 because we don't ship libheif). The
        backend resizes the image to a max edge of 1568px, sends it to Claude Vision
        with a tool-forced output, and uses the returned `{name, nutriments_per_100g}`
        to create a freeform meal entry. The response carries both the canonical `meal`
        block and an `inference` block reporting model, confidence, token usage, and
        image dimensions. Returns `503 vision_unavailable` when `ANTHROPIC_API_KEY`
        is not configured.
      parameters:
      - description: Optional client-supplied idempotency key. Hash includes the raw
          image bytes so byte-identical replays return the original meal without a
          second Claude call.
        in: header
        name: Idempotency-Key
        type: string
      - description: Image file (JPEG or PNG; HEIC rejected in v1).
        in: formData
        name: image
        required: true
        type: file
      - description: Meal quantity in grams. Default 100.
        in: formData
        name: quantity_g
        type: number
      - description: RFC 3339 timestamp; default now().
        in: formData
        name: logged_at
        type: string
      - description: breakfast | lunch | dinner | snack.
        in: formData
        name: meal_type
        type: string
      - description: Optional free-text note.
        in: formData
        name: note
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/meals.fromPhotoResponse'
        "400":
          description: image_required | quantity_g_invalid | logged_at_invalid | logged_at_too_far_future
            | meal_type_invalid | note_too_long
          schema:
            additionalProperties:
              type: string
            type: object
        "413":
          description: image_too_large with max_bytes hint
          schema:
            additionalProperties: true
            type: object
        "415":
          description: unsupported_media_type
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: vision_rate_limited with retry_after_seconds
          schema:
            additionalProperties: true
            type: object
        "502":
          description: vision_unexpected_response | vision_response_unparseable
          schema:
            additionalProperties: true
            type: object
        "503":
          description: vision_unavailable (ANTHROPIC_API_KEY not configured)
          schema:
            additionalProperties:
              type: string
            type: object
        "504":
          description: vision_timeout | vision_upstream_error with retry_after_seconds
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Log a meal from a photo via Claude Vision
      tags:
      - meals
