        in: query
        name: body_weight_kg
        type: number
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/summary.ProteinDistribution'
        "400":
          description: date_required | date_invalid | tz_invalid | body_weight_kg_invalid
            | weight_data_missing
          schema:
            additionalProperties:
              type: string
            type: object
