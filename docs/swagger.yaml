    type: object
  coachcontext.LoadSummary:
    properties:
      by_sport:
        additionalProperties:
          type: integer
        type: object
      count:
        type: integer
      total_duration_min:
        type: number
      total_kcal:
        type: number
    type: object
  coachcontext.MacrocycleLite:
    properties:
      current_phase_ordinal:
        description: |-
          CurrentPhaseOrdinal is the covering phase's macrocycle_ordinal when that
          phase belongs to this season, else null. TotalPeriods is the count of
          phases linked to the season.
        type: integer
      days_to_race:
        description: |-
          DaysToRace is race_date − anchor_date in whole days, present only when the
          season is race-anchored.
        type: integer
      end_date:
        type: string
      id:
        type: string
      name:
        type: string
      race_date:
        type: string
      race_id:
        description: Race anchor — all null when the season has no race_id.
        type: string
      race_name:
        type: string
      start_date:
        type: string
      total_periods:
        type: integer
    type: object
  coachcontext.PhaseLite:
    properties:
      end_date:
        type: string
      id:
        type: string
      methodology:
        description: |-
          Methodology is the covering phase's curated "why" prose (Markdown, null
          when unset), so the coach has the current phase's reasoning in the same
          grounding call.
        type: string
      name:
        type: string
      start_date:
        type: string
      type:
        $ref: '#/definitions/trainingphases.PhaseType'
    type: object
  coachcontext.RecoveryContext:
    properties:
      date:
        type: string
      days:
        type: integer
      latest:
        $ref: '#/definitions/recoverymetrics.Snapshot'
      recent:
        items:
          $ref: '#/definitions/recoverymetrics.Snapshot'
        type: array
    type: object
  coachcontext.TrainingContext:
    properties:
      acwr:
        description: |-
          ACWR is the acute:chronic load ratio, derived (acute ÷ chronic) only when
          both loads are present; null otherwise. Never stored.
        type: number
      athlete_config:
        allOf:
        - $ref: '#/definitions/athleteconfig.AthleteConfig'
        description: |-
          AthleteConfig is the singleton physiology config (FTP, thresholds, HR/power
          zones) so the coach grounds intensity advice on the athlete's zones in the
          same call; null when no config row has been set.
      date:
        type: string
      effective:
        allOf:
        - $ref: '#/definitions/athleteconfig.EffectiveConfig'
        description: |-
          Effective is the resolved physiology computations actually consume (config
          with garmin-sourced fields swapped for the detection, per-field annotated);
          null when neither a config nor an applied detection exists.
      fitness:
        $ref: '#/definitions/fitnessmetrics.Snapshot'
      garmin_detected:
        allOf:
        - $ref: '#/definitions/athleteconfig.GarminDetectedThresholds'
        description: |-
          GarminDetected is the latest Garmin-detected physiology (advisory), so the
          coach sees drift against the confirmed config in one read; null when no
          detection has been recorded. (separate-garmin-threshold-detection)
      lookahead_days:
        type: integer
      lookback_days:
        type: integer
      macrocycle:
        allOf:
        - $ref: '#/definitions/coachcontext.MacrocycleLite'
        description: |-
          Macrocycle is the season covering the anchor date + the current period's
          position in the progression; null when no season covers the date.
      memory:
        description: |-
          Memory is the active coach-memory folded into grounding: standing items
          always, plus recommendations dated within the lookback window; needs_review
          flagged. Never nil; empty array when there's no active memory. This is what
          lets the MCP agent ground on what the in-app coach was told (and vice-versa)
          without sharing conversation transcripts. See widen-coach-recs-to-memory.
        items:
          $ref: '#/definitions/coachmemory.Memory'
        type: array
      phase:
        $ref: '#/definitions/coachcontext.PhaseLite'
      recent_load:
        $ref: '#/definitions/coachcontext.LoadSummary'
      recent_workouts:
        items:
          $ref: '#/definitions/coachcontext.WorkoutLite'
        type: array
      threshold_sources:
        description: |-
          ThresholdSources is the active garmin-sourced field policy — which fields
          computations read from Garmin instead of the confirmed config; empty slice
          when all-manual.
        items:
          type: string
        type: array
      tz:
        type: string
      upcoming_workouts:
        items:
          $ref: '#/definitions/coachcontext.WorkoutLite'
        type: array
      watts_per_kg:
        description: |-
          WattsPerKg is power-to-weight, derived (ftp_watts ÷ latest bodyweight kg)
          only when both are present and bodyweight is non-zero; null otherwise.
          Never stored.
        type: number
    type: object
  coachcontext.WorkoutLite:
    properties:
      duration_min:
        type: number
      ended_at:
        type: string
      id:
        type: string
      kcal_burned:
        type: number
      name:
        type: string
      sport:
        type: string
      started_at:
        type: string
      status:
        type: string
      tss:
        type: number
    type: object
  coachmemory.Kind:
    enum:
    - fact
    - preference
    - constraint
    - observation
    - recommendation
    type: string
    x-enum-varnames:
    - KindFact
    - KindPreference
    - KindConstraint
    - KindObservation
    - KindRecommendation
  coachmemory.Memory:
    properties:
      created_at:
        type: string
      date:
        description: YYYY-MM-DD; required when kind=recommendation
        type: string
      expires_at:
        description: YYYY-MM-DD; hard cutoff
        type: string
      id:
        type: string
      kind:
        $ref: '#/definitions/coachmemory.Kind'
      needs_review:
        description: |-
          NeedsReview is derived at grounding time (review_at <= as-of date), never
          stored. Omitted from the plain CRUD responses; set on the context blocks.
        type: boolean
      reason:
        type: string
      review_at:
        description: YYYY-MM-DD; soft "still true?"
        type: string
      scope:
        $ref: '#/definitions/coachmemory.Scope'
      status:
        $ref: '#/definitions/coachmemory.Status'
      text:
        type: string
      updated_at:
        type: string
    type: object
  coachmemory.Scope:
    enum:
    - fueling
    - training
    - recovery
    - race
    - general
    type: string
    x-enum-varnames:
    - ScopeFueling
    - ScopeTraining
    - ScopeRecovery
    - ScopeRace
    - ScopeGeneral
  coachmemory.Status:
    enum:
    - active
    - archived
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusArchived
  coachmemory.createRequest:
    properties:
      date:
        type: string
      expires_at:
        type: string
      kind:
        type: string
      reason:
        type: string
      review_at:
        type: string
      scope:
        type: string
      text:
        type: string
    type: object
  dailycontext.AdherenceBlock:
    properties:
      adherence:
        $ref: '#/definitions/summary.Adherence'
      goal_source:
        type: string
      phase_name:
        type: string
    type: object
  dailycontext.DailyContext:
    properties:
      adherence:
        $ref: '#/definitions/dailycontext.AdherenceBlock'
      date:
        type: string
      fitness:
        $ref: '#/definitions/fitnessmetrics.Snapshot'
      fuel_plan:
        allOf:
        - $ref: '#/definitions/dailycontext.FuelPlanBlock'
        description: |-
          Today's and tomorrow's planned-load classification + suggested carb target,
          beside the goals data so the morning check-in reads it without another
          call. Omitted entirely when nothing is computable. Suggestions only — the
          full week and the inputs behind each tier stay behind /nutrition/fuel-plan,
          and applying a number is the goal-override PUT (add-periodized-fuel-targets).
      goal_override:
        $ref: '#/definitions/dailycontext.GoalOverrideBlock'
      hydration:
        $ref: '#/definitions/dailycontext.HydrationBlock'
      hydration_balance:
        allOf:
        - $ref: '#/definitions/hydrationbalance.Snapshot'
        description: |-
          Garmin's daily water-balance estimate (sweat out, activity intake in, goal).
          Same-day-or-null. Distinct from the Hydration block (logged intake).
      memory:
        description: |-
          Memory is the active coach-memory folded into grounding (standing items +
          recommendations for the date), needs_review flagged. Never nil; empty array
          when there's no active memory. See widen-coach-recs-to-memory.
        items:
          $ref: '#/definitions/coachmemory.Memory'
        type: array
      nutrition:
        $ref: '#/definitions/dailycontext.NutritionBlock'
      phase:
        allOf:
        - $ref: '#/definitions/dailycontext.PhaseBlock'
        description: nil when no phase covers the date
      recovery:
        allOf:
        - $ref: '#/definitions/recoverymetrics.Snapshot'
        description: |-
          Same-day-or-null Garmin snapshots — no carryover (a stale recovery/fitness
          reading is misleading). nil when no snapshot exists for the date.
      supplements:
        description: |-
          Today's supplement intakes (creatine, iron, …), ascending. Omitted entirely
          when none were logged today. Unit-isolated — feeds no macro total
          (add-supplement-log).
        items:
          $ref: '#/definitions/supplements.Entry'
        type: array
      tz:
        type: string
      weight:
        allOf:
        - $ref: '#/definitions/dailycontext.WeightBlock'
        description: nil when no entry ever logged
      wellness:
        allOf:
        - $ref: '#/definitions/wellness.Entry'
        description: |-
          Today's subjective wellness entry (self-reported scores + note), beside the
          objective recovery snapshot. Omitted entirely when unlogged — never an empty
          object. History stays behind the wellness endpoints (add-wellness-diary).
      workout_fuel:
        description: never nil; empty array on quiet days
        items:
          $ref: '#/definitions/dailycontext.WorkoutFuelLite'
        type: array
      workouts:
        description: never nil; empty array on quiet days
        items:
          $ref: '#/definitions/dailycontext.WorkoutLite'
        type: array
    type: object
  dailycontext.FuelPlanBlock:
    properties:
      today:
        $ref: '#/definitions/dailycontext.FuelPlanDay'
      tomorrow:
        $ref: '#/definitions/dailycontext.FuelPlanDay'
