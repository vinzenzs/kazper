# Default values for kazper.
# See README.md for the install / upgrade walkthrough.

# -- Container image. tag defaults to the chart's appVersion when empty.
image:
  repository: ghcr.io/vinzenzs/kazper
  tag: ""
  pullPolicy: IfNotPresent

# -- Image pull secrets (set if the registry isn't public).
imagePullSecrets: []
#   - name: ghcr-pull

# -- Override the release name in template-rendered object names.
nameOverride: ""
fullnameOverride: ""

# -- Single-replica is the only supported topology in v1. See
#    openspec/specs/deployment-pipeline — Recreate + replicas=1 means the
#    in-process migration on startup is safe.
replicaCount: 1

# -- Pod-level securityContext. Distroless-nonroot image runs as 65532.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

# -- Container-level securityContext.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Resource requests / limits. Defaults sized for a personal cluster.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

service:
  type: ClusterIP
  port: 80
  # -- Pod port. Matches the EXPOSE 8080 in the Dockerfile.
  targetPort: 8080

ingress:
  # -- Set true to render an Ingress. Defaults off so the chart works on
  #    clusters without ingress-nginx installed.
  enabled: false
  # -- Defaults to "nginx"; override for clusters with a different class.
  className: nginx
  # -- Fully-qualified host the API will be reached at.
  host: nutrition.example.com
  # -- Extra annotations merged into the Ingress. The chart adds:
  #     nginx.ingress.kubernetes.io/proxy-body-size: 10m
  #    automatically so /meals/from_photo uploads aren't truncated.
  extraAnnotations: {}
  tls:
    # -- When true, the Ingress carries a tls: section and the
    #    cert-manager.io/cluster-issuer annotation is set.
    enabled: false
    # -- Name of a cert-manager ClusterIssuer that mints the cert.
    issuer: letsencrypt-prod
    # -- Secret to store the cert in. Defaults to "<fullname>-tls".
    secretName: ""

# -- Non-secret config. Mirrors the env vars README.md "Configuration" table.
config:
  defaultUserTz: UTC
  migrateOnStart: true
  swaggerEnabled: false
  offTimeoutSeconds: 5
  offUserAgentContact: "+https://github.com/vinzenzs/kazper"
  idempotencyTtlHours: 24
  claudeVisionModel: claude-sonnet-4-6
  visionTimeoutSeconds: 15
  mealFromPhotoMaxBytes: 10485760
  # -- In-cluster base URL of the garmin-bridge. When set, the backend's
  #    /garmin/login, /garmin/calendar, /garmin/backfill, … proxies forward to
  #    it; empty → those endpoints return 503 garmin_disabled. Typically the
  #    in-cluster Service of the bridge (e.g. http://<release>-garmin-bridge).
  garminBridgeUrl: ""
  # -- FCM push (opt-in). Firebase project id for Android push (HTTP v1). Pairs
  #    with secrets.fcmServiceAccountJson — when this is set the credential is
  #    REQUIRED (install fails otherwise). Leave both empty to keep push disabled
  #    (the push surface returns 503 push_disabled and the relogin notification
  #    is a no-op).
  fcmProjectId: ""

# -- Reference an externally-managed Secret. When set, the chart will NOT
#    render its own Secret; the Deployment's envFrom uses this name.
#    The Secret must contain keys: DATABASE_URL, MOBILE_API_TOKEN,
#    AGENT_API_TOKEN (and optionally ANTHROPIC_API_KEY, FEED_SECRET when the
#    public race feed is enabled, plus GARMIN_API_TOKEN + GARMIN_TOKEN_ENC_KEY
#    when the backend Garmin integration is enabled, and FCM_SERVICE_ACCOUNT_JSON
#    when Android push is enabled).
existingSecret: ""

# -- Secret values populated into a chart-managed Secret.
#    REQUIRED when existingSecret is empty:
#       databaseUrl, mobileApiToken, agentApiToken
#    OPTIONAL:
#       anthropicApiKey — empty falls back to 503 vision_unavailable on
#                          /meals/from_photo (existing handler behaviour).
#       feedSecret      — the shared secret gating GET /public/race-feed. When
#                          set, the backend enables the endpoint and checks the
#                          X-Feed-Key header against it; empty ⇒ 503 feed_disabled
#                          (endpoint off). This is the API server's copy — the
#                          public-site pod holds NO feed secret (build-time bake).
#    Garmin integration (opt-in): set garminApiToken to enable the backend's
#       /garmin/* endpoints under the `garmin` bearer identity (it must equal the
#       garmin-bridge's GARMIN_API_TOKEN). When garminApiToken is set,
#       garminTokenEncKey is REQUIRED — a base64-encoded 32-byte AES-256 key used
#       to encrypt the stored Garmin token at rest. Generate one with:
#           openssl rand -base64 32
#       Leave both empty to keep the backend's Garmin integration disabled.
#    Push (opt-in): fcmServiceAccountJson is REQUIRED when config.fcmProjectId is
#       set. It is either inline Google service-account JSON or a path to a mounted
#       credential file (the binary resolves which). Because the JSON is multi-line,
#       prefer --set-file:
#           helm install ... --set config.fcmProjectId=my-proj \
#                            --set-file secrets.fcmServiceAccountJson=service-account.json
#       Leave it (and config.fcmProjectId) empty to keep push disabled.
#    Web dashboard (opt-in): set webUser AND webPassword to enable the browser
#       coach dashboard (client_id="web"), served same-origin at /. Both are
#       required together. Basic auth is base64, NOT encryption — only expose the
#       dashboard over TLS (ingress.tls) or a Tailscale tailnet, never bare HTTP.
secrets:
  databaseUrl: ""
  mobileApiToken: ""
  agentApiToken: ""
  anthropicApiKey: ""
  feedSecret: ""
  garminApiToken: ""
  garminTokenEncKey: ""
  fcmServiceAccountJson: ""
  webUser: ""
  webPassword: ""

# -- Liveness probe — see openspec/specs/deployment-pipeline for tuning rationale.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe — fast to flip pods out of Service endpoints if
#    Postgres becomes unreachable.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- ServiceAccount for the pod.
serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

# -- garmin-bridge: opt-in Garmin Connect → REST sync sidecar
#    (apps/garmin-bridge/). Disabled by default — when enabled is false the
#    chart renders no bridge Deployment/Service/Secret/CronJob at all. See
#    apps/garmin-bridge/README.md for the one-time MFA login bootstrap.
garminBridge:
  enabled: false

  image:
    repository: ghcr.io/vinzenzs/garmin-bridge
    # -- Defaults to the chart appVersion when empty.
    tag: ""
    pullPolicy: IfNotPresent

  # -- IANA timezone the daily sync resolves "today" in (the user's local day).
  syncTz: UTC

  # -- Rolling-window lookback for the dateless daily sync. Each cron run POSTs
  #    /sync with no date, which re-pulls today + this many prior days (default
  #    2 → a 3-day window). A same-day-only sync misses a day's own completed
  #    activities (they happen after the 05:00 run) and Garmin's later-computed
  #    training-load / VO2max / race-predictor metrics (recomputed once activities
  #    process); re-pulling recent days lets those late signals land. Date-keyed
  #    upserts + external_id workout dedup make the re-pull safe. 0 = today only.
  syncLookbackDays: 2

  # -- Backend origin the bridge POSTs to (origin only; the /api/v1 version
  #    prefix is appended automatically). Empty → the in-cluster backend
  #    Service DNS (http://<fullname>:<service.port>).
  nutritionApiUrl: ""

  # -- Reference an externally-managed Secret instead of the chart-rendered one.
  #    Must contain keys: GARMIN_EMAIL, GARMIN_PASSWORD, GARMIN_API_TOKEN.
  existingSecret: ""

  # -- Secret values for the chart-rendered Secret. REQUIRED when enabled and
  #    existingSecret is empty. GARMIN_API_TOKEN must equal the backend's
  #    configured GARMIN_API_TOKEN (the `garmin` identity).
  secrets:
    garminEmail: ""
    garminPassword: ""
    garminApiToken: ""

  resources:
    requests:
      cpu: 25m
      memory: 96Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # -- History backfill pacing (POST /sync/backfill — an explicit, agent/operator
  #    triggered range replay, NOT scheduled). dayDelaySeconds paces Garmin calls
  #    between days; maxDays caps the range so a typo can't launch a year-long
  #    crawl. The steady-state rolling-window CronJob below is unaffected.
  backfill:
    dayDelaySeconds: 3
    maxDays: 120

  # -- Daily sync CronJob that POSTs /sync on the bridge Service.
  cron:
    enabled: true
    # -- 05:00 in the cluster's timezone by default.
    schedule: "0 5 * * *"
    # -- Tiny image with curl + a POSIX shell for the trigger.
    image: curlimages/curl:8.7.1
    # -- First-run backfill: when > 0, the Job loops POST /sync over the last N
    #    days (safe to re-run — date upserts + external_id dedup). Set back to 0
    #    after the initial import.
    backfillDays: 0

# -- Scheduled database backup (opt-in). Disabled by default — when
#    backup.enabled is false the chart renders NO CronJob and NO backup PVC, so
#    a fresh install's object set is identical to the pre-backup contract. When
#    enabled, a CronJob runs `pg_dump -Fc` against the same DATABASE_URL Secret
#    the Deployment uses (honoring existingSecret) and writes a timestamped dump
#    to a chart-managed PVC, keeping the newest `retention` files. See BACKUP.md
#    for retrieving a dump and the restore drill.
backup:
  enabled: false

  # -- Cron schedule (cluster timezone). Default 03:00 daily — off-peak, and
  #    pg_dump takes a consistent MVCC snapshot so no locking concern at this
  #    write volume.
  schedule: "0 3 * * *"

  # -- Postgres client image used purely for its version-matched pg_dump. The
  #    app image is distroless (no shell, no pg tools). Track the SERVER major
  #    version: pg_dump newer-than-server is supported, older-than-server is not.
  image: postgres:16

  # -- Keep-last-N retention. Pruning runs only AFTER a successful dump, so a
  #    failing dump can never rotate out existing good backups. 14 dailies ≈ two
  #    weeks with the default schedule.
  retention: 14

  storage:
    # -- Size of the chart-managed PVC the dumps are written to.
    size: 5Gi
    # -- Optional StorageClass. Empty uses the cluster default.
    storageClassName: ""

# ---------------------------------------------------------------------------
# Public "road to race" site (host-public-site-in-cluster). Opt-in, default
# OFF: when disabled the chart renders no public-site objects. It is served as
# a static nginx container built from the race feed at IMAGE-BUILD time (the
# feed secret is a build secret — it never enters the image or the running pod)
# and exposed on its OWN public ingress host with NO route to the API.
publicSite:
  # -- Set true to render the public-site Deployment + Service + Ingress.
  enabled: false
  image:
    # -- Image published by the public-site CI workflow.
    repository: ghcr.io/vinzenzs/kazper-public-site
    # -- Mutable tag the workflow rolls; Always pull picks up nightly rebuilds.
    tag: "latest"
    pullPolicy: Always
  # -- Replicas. One is plenty for a static file server.
  replicas: 1
  # -- Public hostname the page is served at, e.g. race.example.com. Required
  #    when publicSite.enabled.
  host: ""
  ingress:
    # -- Ingress class; defaults to the same nginx the API ingress assumes.
    className: nginx
    tls:
      # -- When true, the Ingress carries tls: + the cert-manager annotation.
      enabled: true
      # -- cert-manager ClusterIssuer that mints the cert.
      issuer: letsencrypt-prod
      # -- TLS secret name. Empty defaults to <fullname>-public-site-tls.
      secretName: ""
  # -- Resource requests/limits. Tiny; static nginx.
  resources: {}
