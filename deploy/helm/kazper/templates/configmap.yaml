apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kazper.configMapName" . }}
  labels:
    {{- include "kazper.labels" . | nindent 4 }}
data:
  # Mirrors the README.md Configuration table — every non-secret env var the
  # Viper config layer reads. Keys MUST be the env-var names the binary
  # expects, not camelCase mirrors of values.yaml.
  DEFAULT_USER_TZ: {{ .Values.config.defaultUserTz | quote }}
  DEFAULT_TRAINING_START: {{ .Values.config.defaultTrainingStart | quote }}
  MIGRATE_ON_START: {{ .Values.config.migrateOnStart | quote }}
  SWAGGER_ENABLED: {{ .Values.config.swaggerEnabled | quote }}
  OFF_TIMEOUT_SECONDS: {{ .Values.config.offTimeoutSeconds | quote }}
  OFF_USER_AGENT_CONTACT: {{ .Values.config.offUserAgentContact | quote }}
  IDEMPOTENCY_TTL_HOURS: {{ .Values.config.idempotencyTtlHours | quote }}
  CLAUDE_VISION_MODEL: {{ .Values.config.claudeVisionModel | quote }}
  VISION_TIMEOUT_SECONDS: {{ .Values.config.visionTimeoutSeconds | quote }}
  # int64 before quote: a `--set config.mealFromPhotoMaxBytes=N` override is
  # stored as a float64 by Helm and would otherwise render in scientific
  # notation ("1.048576e+07"), which the binary's int64 parser rejects.
  MEAL_FROM_PHOTO_MAX_BYTES: {{ .Values.config.mealFromPhotoMaxBytes | int64 | quote }}
  HTTP_ADDR: ":{{ .Values.service.targetPort }}"
  {{- if .Values.config.garminBridgeUrl }}
  GARMIN_BRIDGE_URL: {{ .Values.config.garminBridgeUrl | quote }}
  {{- end }}
  {{- if .Values.config.fcmProjectId }}
  # FCM push (opt-in). Emitted only when set; pairs with the secret
  # FCM_SERVICE_ACCOUNT_JSON. With either unset, push is inert (503 push_disabled).
  FCM_PROJECT_ID: {{ .Values.config.fcmProjectId | quote }}
  {{- end }}
  {{- if or (ne (toString .Values.config.homeLat) "") (ne (toString .Values.config.homeLon) "") }}
  # Home location (opt-in) for the weather/heat reads. Emitted only when set,
  # and BOTH keys are emitted together whenever either is: the backend validates
  # the pair at startup, so a one-sided config fails loudly here rather than
  # silently resolving every non-travel date to `location_unconfigured`.
  #
  # `ne (toString …) ""` rather than a plain truthiness test, because 0 is a
  # real coordinate but is FALSY in Go templates. In practice this only differs
  # at exactly (0, 0) — a plain `or` still fires when either half is non-zero —
  # and (0, 0) is open ocean, so this guard buys correctness rather than a bug
  # fix. It is kept because expressing "is it set" as "is it set" costs nothing
  # and does not quietly depend on nobody living on a zero meridian.
  # toString additionally normalises a `--set`-coerced number back to a string.
  HOME_LAT: {{ .Values.config.homeLat | toString | quote }}
  HOME_LON: {{ .Values.config.homeLon | toString | quote }}
  {{- end }}
