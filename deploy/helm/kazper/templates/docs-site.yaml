{{- if .Values.docsSite.enabled -}}
{{- /*
  docs-site: the opt-in MkDocs user guide. Everything is gated on
  docsSite.enabled, so a default install renders none of it. The pod is a static
  nginx container built from checked-in Markdown by the docs-site CI workflow —
  no secrets, no env coupling to Kazper.

  The Ingress is additionally gated on docsSite.ingress.enabled (default off,
  mirroring the API's ingress.enabled): clusters fronted by a non-ingress proxy
  (e.g. Pangolin) point it at the ClusterIP Service directly and rely on the
  proxy's own auth layer. When the nginx Ingress IS used, the guide supports
  optional basic auth (docsSite.ingress.auth) via the nginx auth-secret
  annotations — the docs describe a personal system.
*/ -}}
{{- $name := include "docs-site.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "docs-site.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.docsSite.replicas }}
  selector:
    matchLabels:
      {{- include "docs-site.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "docs-site.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      # nginx-unprivileged runs as uid 101 on 8080, satisfying runAsNonRoot
      # without the API's readOnlyRootFilesystem (same posture as public-site).
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: docs-site
          image: {{ include "docs-site.image" . }}
          imagePullPolicy: {{ .Values.docsSite.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          # No env: a static file server with no secrets and no Kazper coupling.
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.docsSite.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "docs-site.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "docs-site.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
{{- if .Values.docsSite.ingress.enabled }}
{{- $host := required "docsSite.host is required when docsSite.ingress.enabled" .Values.docsSite.host }}
{{- $tlsSecret := default (printf "%s-tls" $name) .Values.docsSite.ingress.tls.secretName }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}
  labels:
    {{- include "docs-site.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.docsSite.ingress.tls.enabled }}
    cert-manager.io/cluster-issuer: {{ .Values.docsSite.ingress.tls.issuer | quote }}
    {{- end }}
    {{- if .Values.docsSite.ingress.auth.enabled }}
    # Basic auth at the ingress: the guide documents a personal system. The
    # secret is operator-provisioned (htpasswd format, key "auth") and never
    # chart-managed.
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ required "docsSite.ingress.auth.secretName is required when auth.enabled" .Values.docsSite.ingress.auth.secretName | quote }}
    nginx.ingress.kubernetes.io/auth-realm: "Kazper docs"
    {{- end }}
spec:
  ingressClassName: {{ .Values.docsSite.ingress.className }}
  {{- if .Values.docsSite.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ $tlsSecret }}
  {{- end }}
  rules:
    # The only backend is the docs-site Service — never the API.
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}
                port:
                  number: 80
{{- end }}
{{- end }}
