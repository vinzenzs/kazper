{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kazper.fullname" . }}
  labels:
    {{- include "kazper.labels" . | nindent 4 }}
type: Opaque
# Three values are required when the chart owns the Secret. `required` blows
# up `helm install` with a clear error if they're missing.
# ANTHROPIC_API_KEY is optional — the meal-from-photo handler returns
# 503 vision_unavailable when it's empty (existing behaviour).
stringData:
  DATABASE_URL: {{ required "secrets.databaseUrl is required when existingSecret is empty" .Values.secrets.databaseUrl | quote }}
  MOBILE_API_TOKEN: {{ required "secrets.mobileApiToken is required when existingSecret is empty" .Values.secrets.mobileApiToken | quote }}
  AGENT_API_TOKEN: {{ required "secrets.agentApiToken is required when existingSecret is empty" .Values.secrets.agentApiToken | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" | quote }}
{{- if .Values.secrets.garminApiToken }}
  # Garmin integration is opt-in. When the token is set the backend REQUIRES the
  # encryption key (base64 32-byte AES-256) — `required` fails the install with a
  # clear message rather than letting the pod crash-loop on the same validation.
  GARMIN_API_TOKEN: {{ .Values.secrets.garminApiToken | quote }}
  GARMIN_TOKEN_ENC_KEY: {{ required "secrets.garminTokenEncKey is required when secrets.garminApiToken is set — a base64-encoded 32-byte AES-256 key (generate with `openssl rand -base64 32`)" .Values.secrets.garminTokenEncKey | quote }}
{{- end }}
{{- if .Values.secrets.feedSecret }}
  # Public race feed is opt-in. When set, the backend enables
  # `GET /public/race-feed` and validates the `X-Feed-Key` request header against
  # this value (constant-time); empty/unset ⇒ the endpoint returns
  # `503 feed_disabled` (existing behaviour). This is the API SERVER's copy — the
  # optional public-site pod deliberately carries NO feed secret (it bakes the
  # feed into static files at image-build time; see the `publicSite` block).
  FEED_SECRET: {{ .Values.secrets.feedSecret | quote }}
{{- end }}
{{- if .Values.config.fcmProjectId }}
  # FCM push is opt-in. config.fcmProjectId gates the credential: when the project
  # id is set the backend REQUIRES the service-account JSON at startup, so `required`
  # fails the install with a clear message rather than letting the pod crash-loop on
  # the same validation. Value is inline service-account JSON or a path to a mounted
  # credential (the binary resolves which).
  FCM_SERVICE_ACCOUNT_JSON: {{ required "secrets.fcmServiceAccountJson is required when config.fcmProjectId is set — inline service-account JSON or a path to a mounted credential (use --set-file)" .Values.secrets.fcmServiceAccountJson | quote }}
{{- else if .Values.secrets.fcmServiceAccountJson }}
  # Credential supplied without a project id — surfaced rather than dropped, but
  # push stays disabled (PushEnabled() requires FCM_PROJECT_ID).
  FCM_SERVICE_ACCOUNT_JSON: {{ .Values.secrets.fcmServiceAccountJson | quote }}
{{- end }}
{{- if or .Values.secrets.webUser .Values.secrets.webPassword }}
  # Web dashboard (opt-in). The web identity is recognized only when BOTH are set;
  # `required` fails the install on a half-configured credential rather than
  # silently disabling the dashboard. Reach it over TLS/Tailscale — Basic auth is
  # base64, not encryption.
  WEB_USER: {{ required "secrets.webUser is required when secrets.webPassword is set" .Values.secrets.webUser | quote }}
  WEB_PASSWORD: {{ required "secrets.webPassword is required when secrets.webUser is set" .Values.secrets.webPassword | quote }}
{{- end }}
{{- end }}
